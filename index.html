// ── Grafici SVG nativi (zero dipendenze) ──────────────────────────

function SvgBarChart({ data, keys, colors, height=210, yUnit="" }) {
  const W=580, H=height, PL=40, PR=10, PT=10, PB=24;
  const vals = data.flatMap(d => keys.map(k => d[k]||0));
  const maxV = Math.max(...vals, 1);
  const bw = (W-PL-PR)/data.length;
  const bGap = 4;
  const bw2 = (bw - bGap*(keys.length+1)) / keys.length;
  return (
    <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height}}>
      {[0,0.25,0.5,0.75,1].map(t=>{
        const y = PT + (H-PT-PB)*(1-t);
        const v = Math.round(maxV*t);
        return <g key={t}>
          <line x1={PL} x2={W-PR} y1={y} y2={y} stroke="#272220" strokeDasharray="3 3"/>
          <text x={PL-4} y={y+4} textAnchor="end" fontSize={9} fill="#8a7e68">{yUnit}{v.toLocaleString("it-IT")}</text>
        </g>;
      })}
      {data.map((d,i)=>{
        const x0 = PL + i*bw + bGap;
        return <g key={i}>
          {keys.map((k,ki)=>{
            const v = d[k]||0;
            const bh = (H-PT-PB)*(v/maxV);
            const bx = x0 + ki*(bw2+bGap);
            const by = PT+(H-PT-PB)-bh;
            return <rect key={k} x={bx} y={by} width={bw2} height={bh} fill={colors[ki]} opacity={ki===0?1:0.55} rx={2}/>;
          })}
          <text x={PL+i*bw+bw/2} y={H-6} textAnchor="middle" fontSize={9} fill="#8a7e68">{d.month||d.q}</text>
        </g>;
      })}
      <line x1={PL} x2={PL} y1={PT} y2={H-PB} stroke="#272220"/>
    </svg>
  );
}

function SvgAreaChart({ data, keys, colors, height=210, yUnit="" }) {
  const W=580, H=height, PL=40, PR=10, PT=10, PB=24;
  const vals = data.flatMap(d => keys.map(k => d[k]||0));
  const maxV = Math.max(...vals, 1);
  const xStep = (W-PL-PR)/(data.length-1||1);
  const yScale = v => PT + (H-PT-PB)*(1 - v/maxV);
  const xPos = i => PL + i*xStep;
  return (
    <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height}}>
      <defs>
        {colors.map((c,ci)=>(
          <linearGradient key={ci} id={"ag"+ci} x1="0" y1="0" x2="0" y2="1">
            <stop offset="10%" stopColor={c} stopOpacity={0.25}/>
            <stop offset="95%" stopColor={c} stopOpacity={0}/>
          </linearGradient>
        ))}
      </defs>
      {[0,0.25,0.5,0.75,1].map(t=>{
        const y = PT + (H-PT-PB)*(1-t);
        const v = Math.round(maxV*t);
        return <g key={t}>
          <line x1={PL} x2={W-PR} y1={y} y2={y} stroke="#272220" strokeDasharray="3 3"/>
          <text x={PL-4} y={y+4} textAnchor="end" fontSize={9} fill="#8a7e68">{yUnit}{v.toLocaleString("it-IT")}</text>
        </g>;
      })}
      {keys.map((k,ki)=>{
        const pts = data.map((d,i) => [xPos(i), yScale(d[k]||0)]);
        const linePath = pts.map((p,i) => (i===0?"M":"L")+p[0]+","+p[1]).join(" ");
        const areaPath = linePath + " L"+xPos(data.length-1)+","+(H-PB)+" L"+PL+","+(H-PB)+" Z";
        return <g key={k}>
          {ki===0 && <path d={areaPath} fill={"url(#ag"+ki+")"} />}
          <path d={linePath} fill="none" stroke={colors[ki]} strokeWidth={ki===0?2:1.5}
            strokeDasharray={ki===0?"none":"5,4"} opacity={ki===0?1:0.7}/>
        </g>;
      })}
      {data.map((d,i)=>(
        <text key={i} x={xPos(i)} y={H-6} textAnchor="middle" fontSize={9} fill="#8a7e68">{d.month}</text>
      ))}
      <line x1={PL} x2={PL} y1={PT} y2={H-PB} stroke="#272220"/>
    </svg>
  );
}

function ChartLegend({ keys, colors }) {
  return (
    <div style={{display:"flex",gap:16,marginTop:8,flexWrap:"wrap"}}>

          {k}
        </div>
      ))}
    </div>
  );
}

function metrics(data = []) {
  const av    = data.reduce((s, d) => s + (d.av||0), 0);
  const oc    = data.reduce((s, d) => s + (d.oc||0), 0);
  const rev   = data.reduce((s, d) => s + (d.rev||0), 0);
  const amf   = data.reduce((s, d) => s + (d.amf||0), 0);
  const vania = data.reduce((s, d) => s + (d.vania||0), 0);
  return {
    occ: av ? Math.round((oc/av)*100) : 0,
    adr: oc ? Math.round(rev/oc) : 0,
    revpar: av ? Math.round(rev/av) : 0,
    totalRev: rev, nights: oc, totalAmf: amf, totalVania: vania,
  };
}

async function askClaude(messages, useWebSearch = false) {
  const apiKey = localStorage.getItem("altiora_apikey")||"";
  const body = {
    model: "claude-sonnet-4-20250514",
    max_tokens: 1000,
    messages,
  };
  if (useWebSearch) body.tools = [{ type: "web_search_20250305", name: "web_search" }];
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify(body),
  });
  const d = await r.json();
  return (d.content||[]).filter(b => b.type==="text").map(b=>b.text).join("\n");
}

  const [tab, setTab] = useState("mensile");

  const [dataStatus, setDataStatus] = useState("loading"); // "loading" | "live" | "fallback"

  const [cmpYear, setCmpYear] = useState(2025);
  const [reports, setReports] = useState({});
  const [propInput, setPropInput] = useState({ address:"", price:"", surface:"", notes:"" });
  const [loading, setLoading] = useState({});

  const [importOpen, setImportOpen] = useState(false);
  const [importText, setImportText] = useState("");
  const [importError, setImportError] = useState("");

  const importaDati = async () => {
    try {
      const json = JSON.parse(importText.trim());
      if (Object.keys(json).length === 0) throw new Error("Oggetto vuoto");
      const parsed = {};
      Object.keys(json).forEach(k => { parsed[Number(k)] = json[k]; });
      setData(parsed);
      const anni = Object.keys(parsed).map(Number).sort((a,b)=>b-a);
      if (anni.length) setSelYear(anni[0]);
      const ts = new Date().toLocaleDateString("it-IT");
      setDataStatus("live:" + ts);
      try { storage.set("altiora-data", JSON.stringify({data: parsed, ts})); } catch {}
      setImportOpen(false);
      setImportText("");
      setImportError("");
    } catch {
      setImportError("JSON non valido — incolla il blocco dall'email del report.");
    }
  };

  // Al mount: carica da storage persistente
  useEffect(() => {
    (async () => {
      try {
        const cached = storage.get("altiora-data");
        if (cached) {
          const {data: d, ts} = JSON.parse(cached.value);
          const parsed = {};
          Object.keys(d).forEach(k => { parsed[Number(k)] = d[k]; });
          setData(parsed);
          const anni = Object.keys(parsed).map(Number).sort((a,b)=>b-a);
          if (anni.length) setSelYear(anni[0]);
          setDataStatus("cached:" + ts);
        } else {
          setDataStatus("local");
        }
      } catch { setDataStatus("local"); }
    })();
  }, []);

  // Confronto automatico con l'anno precedente — sovrascrivibile manualmente
  useEffect(() => { setCmpYear(selYear - 1); }, [selYear]);

  const years = Object.keys(data).map(Number).sort((a,b)=>b-a);
  const curData = data[selYear] || [];
  const cmpData = data[cmpYear] || [];
  const curM = metrics(curData);
  const cmpM = metrics(cmpData);

  const quarters = [0,1,2,3].map(q=>{
    const ms=[q*3,q*3+1,q*3+2];
    const cm=metrics(curData.filter(d=>ms.includes(d.m)));
    const km=metrics(cmpData.filter(d=>ms.includes(d.m)));
    return {
      q:`Q${q+1}`,
      [`Occ ${selYear}`]: cm.occ,
      [`Occ ${cmpYear}`]: km.occ,
      [`Ricavi ${selYear}`]: cm.totalRev,
      [`Ricavi ${cmpYear}`]: km.totalRev,
      _cm: cm, _km: km,
    };
  });

  const delta = (cur, cmp) => {
    if (!cmp) return { pct: 0, pp: 0 };
    return {
      pct: Math.round(((cur-cmp)/cmp)*100),
      pp: Math.round(cur-cmp),
    };
  };

  const generate = async (key, prompt, web=false) => {
    setLoading(l=>({...l,[key]:true}));
    try {
      const r = await askClaude([{role:"user",content:prompt}], web);
      setReports(rp=>({...rp,[key]:r}));

  };

  const monthlyPrompt = () => {

Anno ${selYear}: occupancy ${curM.occ}%, ADR €${curM.adr}, RevPAR €${curM.revpar}, ricavi totali €${curM.totalRev.toLocaleString("it-IT")}, notti vendute ${curM.nights}
Anno ${cmpYear}: occupancy ${cmpM.occ}%, ADR €${cmpM.adr}, RevPAR €${cmpM.revpar}, ricavi totali €${cmpM.totalRev.toLocaleString("it-IT")}

Immobile da valutare:
Indirizzo/zona: ${propInput.address||"Trastevere o zone limitrofe, Roma"}

Rendimento lordo target minimo 8% | Superficie netta 85% | Priorità: buy-renovate-resell o rendita pura | Benchmark: Trastevere, Prati, Pigneto

  // ── TABS nav ──

  // ── KPI row 1: performance ──
  const kpisPerf = [
    { label:"Occupancy", sub:"% notti occupate sul totale disponibile", cur:`${curM.occ}%`, d:delta(curM.occ, cmpM.occ).pct, unit:"%" },
    { label:"ADR", sub:"Tariffa media per notte venduta", cur:`€${curM.adr}`, d:delta(curM.adr, cmpM.adr).pct, unit:"%" },
    { label:"RevPAR", sub:"Ricavo per notte disponibile", cur:`€${curM.revpar}`, d:delta(curM.revpar, cmpM.revpar).pct, unit:"%" },
    { label:"Notti vendute", sub:"Notti fisicamente occupate nell'anno", cur:curM.nights, d:delta(curM.nights, cmpM.nights).pct, unit:"%" },
  ];

  // ── KPI row 2: financial ──
  const kpisFinanz = [

    { label:"Netto AMF", sub:"Compenso netto proprietario annuo", cur:`€${curM.totalAmf.toLocaleString("it-IT")}`, d:delta(curM.totalAmf, cmpM.totalAmf).pct, unit:"%" },
    { label:"Ricavi Vania", sub:"Compenso gestione annuo", cur:`€${curM.totalVania.toLocaleString("it-IT")}`, d:delta(curM.totalVania, cmpM.totalVania).pct, unit:"%" },
  ];

  // ── dati grafici mensili (aggiunto AMF e Vania) ──
  const monthChart = MONTHS.map((m,i)=>{

          <div>
            <div style={{ fontSize:10, color:P.creamDim, letterSpacing:"1px", marginBottom:4 }}>
              ANNO PRINCIPALE
            </div>
            <select value={selYear} onChange={e=>setSelYear(Number(e.target.value))} style={S.select}>
              {years.map(y=><option key={y} value={y}>{y}</option>)}
            </select>
          </div>
          <div>
            <div style={{ fontSize:10, color:P.creamDim, letterSpacing:"1px", marginBottom:4 }}>
              CONFRONTO
            </div>
            <select value={cmpYear} onChange={e=>setCmpYear(Number(e.target.value))} style={S.select}>
              {years.map(y=><option key={y} value={y}>{y}</option>)}
            </select>
          </div>
          <button onClick={()=>setImportOpen(o=>!o)}
            style={{...S.btn(true), padding:"7px 16px", fontSize:10, alignSelf:"flex-end"}}>
            ⊕ Importa dati
          </button>
        </div>
      </div>

      {/* ── PANNELLO IMPORTAZIONE DATI ── */}
      {importOpen && (
        <div style={{ background:"#0e0c0a", borderBottom:`1px solid ${P.border}`,
          padding:"20px 32px" }}>
          <div style={{ maxWidth:700 }}>
            <div style={{ fontSize:11, color:P.gold, letterSpacing:"1px", marginBottom:8 }}>
              IMPORTA DATI DAL REPORT EMAIL
            </div>
            <div style={{ fontSize:12, color:P.creamDim, marginBottom:12, lineHeight:"1.6" }}>
              Copia il blocco JSON dall'email del report mensile e incollalo qui.
            </div>
            <textarea
              value={importText}
              onChange={e=>{ setImportText(e.target.value); setImportError(""); }}
              placeholder={'{"2025": [...], "2026": [...]}'}
              style={{ ...S.input, height:100, fontFamily:"monospace", fontSize:11 }}
            />
            {importError && (
              <div style={{ fontSize:11, color:P.red, marginTop:6 }}>{importError}</div>
            )}
            <div style={{ display:"flex", gap:10, marginTop:12 }}>
              <button onClick={importaDati}
                style={{...S.btn(false), padding:"8px 20px"}}>
                Salva e applica
              </button>
              <button onClick={()=>{ setImportOpen(false); setImportError(""); }}
                style={{...S.btn(true), padding:"8px 20px"}}>
                Annulla
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── TABS ── */}
      <div style={{ borderBottom:`1px solid ${P.border}`, display:"flex",
        padding:"0 32px", gap:4 }}>
        {tabs.map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{
            background:"none", border:"none", cursor:"pointer",
            padding:"12px 18px", fontSize:11, letterSpacing:"2px",
            textTransform:"uppercase", fontWeight:500,
            color: tab===id ? P.gold : P.creamDim,
            borderBottom: tab===id ? `2px solid ${P.gold}` : "2px solid transparent",
            transition:"all .2s",
          }}>{label}</button>
        ))}
      </div>

      <div style={{ padding:"28px 32px", maxWidth:1080, margin:"0 auto" }}>

        {/* ── KPI STRIP 2 righe ── */}
        {(tab==="mensile"||tab==="trimestrale") && (
          <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:28 }}>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12 }}>
              {kpisPerf.map(({ label, sub, cur, d, unit })=>(
                <div key={label} style={{ ...S.card, padding:"18px 16px" }}>
                  <div style={{ fontSize:10, letterSpacing:"2px", color:P.creamDim, textTransform:"uppercase", marginBottom:4 }}>{label}</div>
                  <div style={{ fontSize:10, color:P.creamFaint, marginBottom:8, lineHeight:"1.4" }}>{sub}</div>
                  <div style={{ fontFamily:"'Cormorant Garamond', serif", fontSize:24, color:P.gold, fontWeight:400 }}>{cur}</div>
                  <div style={{ fontSize:11, color: d>=0 ? P.green : P.red, marginTop:5 }}>
                    {d>=0 ? "↑" : "↓"} {Math.abs(d)}{unit} vs {cmpYear}
                  </div>
                </div>
              ))}
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12 }}>
              {kpisFinanz.map(({ label, sub, cur, d, unit })=>(
                <div key={label} style={{ ...S.card, padding:"18px 16px" }}>
                  <div style={{ fontSize:10, letterSpacing:"2px", color:P.creamDim, textTransform:"uppercase", marginBottom:4 }}>{label}</div>
                  <div style={{ fontSize:10, color:P.creamFaint, marginBottom:8, lineHeight:"1.4" }}>{sub}</div>
                  <div style={{ fontFamily:"'Cormorant Garamond', serif", fontSize:24, color:P.gold, fontWeight:400 }}>{cur}</div>
                  <div style={{ fontSize:11, color: d>=0 ? P.green : P.red, marginTop:5 }}>
                    {d>=0 ? "↑" : "↓"} {Math.abs(d)}{unit} vs {cmpYear}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ════════════ MENSILE ════════════ */}
        {tab==="mensile" && (
          <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20 }}>

              {/* Occupancy */}
              <div style={{...S.card, padding:"20px 16px 16px 16px"}}>
                <div style={{ fontSize:10, letterSpacing:"2px", color:P.creamDim, marginBottom:14 }}>
                  OCCUPANCY MENSILE — {selYear} vs {cmpYear}
                </div>
                <SvgBarChart data={monthChart} keys={[`Occ ${selYear}`,`Occ ${cmpYear}`]} colors={[P.gold,P.goldDim]} yUnit="" height={210}/>
                <ChartLegend keys={[`Occ ${selYear}`,`Occ ${cmpYear}`]} colors={[P.gold,P.goldDim]}/>
              </div>

              {/* Ricavi */}
              <div style={{...S.card, padding:"20px 16px 16px 16px"}}>
                <div style={{ fontSize:10, letterSpacing:"2px", color:P.creamDim, marginBottom:14 }}>
                  RICAVI ALTIORA MENSILI — {selYear} vs {cmpYear}
                </div>
                <SvgAreaChart data={monthChart} keys={[`Ricavi ${selYear}`,`Ricavi ${cmpYear}`]} colors={[P.gold,P.goldDim]} height={210}/>
                <ChartLegend keys={[`Ricavi ${selYear}`,`Ricavi ${cmpYear}`]} colors={[P.gold,P.goldDim]}/>
              </div>

              {/* AMF mensile */}
              <div style={{...S.card, padding:"20px 16px 16px 16px"}}>
                <div style={{ fontSize:10, letterSpacing:"2px", color:P.creamDim, marginBottom:14 }}>
                  NETTO AMF MENSILE — {selYear} vs {cmpYear}
                </div>
                <SvgAreaChart data={monthChart} keys={[`AMF ${selYear}`,`AMF ${cmpYear}`]} colors={[P.green,"#4a8a6a"]} height={210}/>
                <ChartLegend keys={[`AMF ${selYear}`,`AMF ${cmpYear}`]} colors={[P.green,"#4a8a6a"]}/>
              </div>

              {/* Vania mensile */}
              <div style={{...S.card, padding:"20px 16px 16px 16px"}}>
                <div style={{ fontSize:10, letterSpacing:"2px", color:P.creamDim, marginBottom:14 }}>
                  RICAVI VANIA MENSILI — {selYear} vs {cmpYear}
                </div>
                <SvgBarChart data={monthChart} keys={[`Vania ${selYear}`,`Vania ${cmpYear}`]} colors={["#9a7ac9","#6a4a99"]} height={210}/>
                <ChartLegend keys={[`Vania ${selYear}`,`Vania ${cmpYear}`]} colors={["#9a7ac9","#6a4a99"]}/>
              </div>
            </div>

            {/* Monthly AI analysis */}
            <div style={S.card}>
              <div style={{ padding:"16px 20px", borderBottom:`1px solid ${P.border}`,
                display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div style={{ fontSize:10, letterSpacing:"2px", color:P.creamDim }}>
                  ANALISI INTELLIGENTE {selYear}
                </div>
                <button onClick={()=>generate("monthly", monthlyPrompt())}
                  disabled={loading.monthly} style={S.btn(false)}>
                  {loading.monthly ? "Analisi in corso…" : "Genera Analisi"}
                </button>
              </div>
              <div style={{ padding:"20px", minHeight:80 }}>
                {reports.monthly
                  ? <div style={{ fontSize:14, lineHeight:"1.85", whiteSpace:"pre-line" }}>
                      {reports.monthly}
                    </div>
                  : <div style={{ color:P.creamDim, fontSize:13 }}>
                      Clicca "Genera Analisi" per ottenere un'analisi narrativa intelligente
                      con confronto {selYear}/{cmpYear} e raccomandazioni operative.
                    </div>
                }
              </div>
            </div>
          </div>
        )}

        {/* ════════════ TRIMESTRALE ════════════ */}
        {tab==="trimestrale" && (
          <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20 }}>
              <div style={{...S.card, padding:"20px 16px 16px"}}>
                <div style={{ fontSize:10, letterSpacing:"2px", color:P.creamDim, marginBottom:14 }}>
                  OCCUPANCY PER TRIMESTRE
                </div>
                <SvgBarChart data={quarters} keys={[`Occ ${selYear}`,`Occ ${cmpYear}`]} colors={[P.gold,P.goldDim]} height={230}/>
                <ChartLegend keys={[`Occ ${selYear}`,`Occ ${cmpYear}`]} colors={[P.gold,P.goldDim]}/>
              </div>
              <div style={{...S.card, padding:"20px 16px 16px"}}>
                <div style={{ fontSize:10, letterSpacing:"2px", color:P.creamDim, marginBottom:14 }}>
                  RICAVI PER TRIMESTRE
                </div>
                <SvgBarChart data={quarters} keys={[`Ricavi ${selYear}`,`Ricavi ${cmpYear}`]} colors={[P.gold,P.goldDim]} height={230}/>
                <ChartLegend keys={[`Ricavi ${selYear}`,`Ricavi ${cmpYear}`]} colors={[P.gold,P.goldDim]}/>
              </div>
            </div>

            {/* Quarterly table */}
            <div style={S.card}>
              <div style={{ padding:"14px 20px", borderBottom:`1px solid ${P.border}` }}>
                <div style={{ fontSize:10, letterSpacing:"2px", color:P.creamDim }}>
                  CONFRONTO TRIMESTRALE — {selYear} vs {cmpYear}
                </div>
              </div>
              <div style={{ padding:"16px 20px" }}>
                <table style={{ width:"100%", borderCollapse:"collapse" }}>
                  <thead>
                    <tr>
                      {["","Occ "+selYear,"Occ "+cmpYear,"Δ Occ",
                        "Ricavi "+selYear,"Ricavi "+cmpYear,"Δ Ricavi"].map(h=>(
                        <th key={h} style={{ textAlign:h===""?"left":"right",
                          fontSize:10, letterSpacing:"1.5px", color:P.creamDim,
                          padding:"8px 10px", borderBottom:`1px solid ${P.border}`,
                          fontWeight:500, textTransform:"uppercase" }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {quarters.map((q,i)=>{
                      const dOcc = q[`Occ ${selYear}`] - q[`Occ ${cmpYear}`];
                      const dRev = q[`Ricavi ${cmpYear}`]
                        ? Math.round(((q[`Ricavi ${selYear}`]-q[`Ricavi ${cmpYear}`])/q[`Ricavi ${cmpYear}`])*100) : 0;
                      return (
                        <tr key={i} style={{ borderBottom:`1px solid ${P.border}` }}>
                          <td style={{ padding:"11px 10px",
                            fontFamily:"'Cormorant Garamond',serif",
                            fontSize:18, color:P.gold }}>{q.q}</td>
                          <td style={{ textAlign:"right", padding:"11px 10px", fontSize:14 }}>
                            {q[`Occ ${selYear}`]}%
                          </td>
                          <td style={{ textAlign:"right", padding:"11px 10px",
                            fontSize:14, color:P.creamDim }}>
                            {q[`Occ ${cmpYear}`]}%
                          </td>
                          <td style={{ textAlign:"right", padding:"11px 10px", fontSize:12,
                            color:dOcc>=0?P.green:P.red }}>
                            {dOcc>=0?"+":""}{dOcc}pp
                          </td>
                          <td style={{ textAlign:"right", padding:"11px 10px", fontSize:14 }}>
                            €{q[`Ricavi ${selYear}`].toLocaleString("it-IT")}
                          </td>
                          <td style={{ textAlign:"right", padding:"11px 10px",
                            fontSize:14, color:P.creamDim }}>
                            €{q[`Ricavi ${cmpYear}`].toLocaleString("it-IT")}
                          </td>
                          <td style={{ textAlign:"right", padding:"11px 10px", fontSize:12,
                            color:dRev>=0?P.green:P.red }}>
                            {dRev>=0?"+":""}{dRev}%
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}

        {/* ════════════ MERCATO ════════════ */}
        {tab==="mercato" && (
          <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
            <div style={S.card}>
              <div style={{ padding:"20px 24px", borderBottom:`1px solid ${P.border}`,
                display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                <div>
                  <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:22,
                    color:P.gold, fontWeight:300, marginBottom:6 }}>
                    Mercato Affitti Brevi — Trastevere 2025
                  </div>
                  <div style={{ fontSize:12, color:P.creamDim, lineHeight:"1.6" }}>
                    Analisi in tempo reale tramite ricerca web: prezzi, occupancy media,
                    stagionalità, posizionamento competitivo.
                  </div>
                </div>
                <button onClick={()=>generate("market", marketPrompt, true)}
                  disabled={loading.market} style={{...S.btn(false), marginLeft:24, whiteSpace:"nowrap"}}>
                  {loading.market ? "Ricerca in corso…" : "Aggiorna Report"}
                </button>
              </div>
              <div style={{ padding:"24px", minHeight:100 }}>
                {reports.market
                  ? <div style={{ fontSize:14, lineHeight:"1.9", whiteSpace:"pre-line" }}>
                      {reports.market}
                    </div>
                  : <div style={{ color:P.creamDim, fontSize:13, lineHeight:"1.9" }}>
                      Il report analizzerà prezzi medi per notte per un loft di lusso a Trastevere,
                      tasso di occupazione medio del mercato locale, stagionalità e mesi di picco,
                      dinamiche competitive su Airbnb e Booking, trend 2025 del mercato romano degli affitti brevi,
                      e raccomandazioni di pricing e posizionamento per Altiora.
                    </div>
                }
              </div>
            </div>
          </div>
        )}

        {/* ════════════ OPPORTUNITÀ ════════════ */}
        {tab==="opportunita" && (
          <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
            <div style={S.card}>
              <div style={{ padding:"20px 24px", borderBottom:`1px solid ${P.border}` }}>
                <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:22,
                  color:P.gold, fontWeight:300, marginBottom:4 }}>
                  Valutazione Opportunità Immobiliare
                </div>
                <div style={{ fontSize:12, color:P.creamDim }}>
                  Analisi basata sul framework Altiora: rendimento lordo ≥8%,
                  superficie netta 85%, benchmark Trastevere e zone limitrofe.
                </div>
              </div>
              <div style={{ padding:"24px" }}>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:20 }}>
                  {[
                    { key:"address", label:"Indirizzo / Zona", placeholder:"es. Via della Lungaretta, Trastevere" },
                    { key:"price", label:"Prezzo richiesto (€)", placeholder:"es. 380000", type:"number" },
                    { key:"surface", label:"Superficie totale (mq)", placeholder:"es. 65", type:"number" },
                    { key:"notes", label:"Note aggiuntive", placeholder:"es. ristrutturato, piano alto, terrazzo…" },
                  ].map(({ key, label, placeholder, type })=>(
                    <div key={key}>
                      <label style={S.label}>{label}</label>
                      <input type={type||"text"} style={S.input}
                        value={propInput[key]}
                        onChange={e=>setPropInput(p=>({...p,[key]:e.target.value}))}
                        placeholder={placeholder} />
                    </div>
                  ))}
                </div>

                {/* Reference metrics bar */}
                <div style={{ background:P.goldFaint, border:`1px solid ${P.goldDim}`,
                  borderRadius:3, padding:"12px 16px", marginBottom:20,
                  display:"flex", gap:24 }}>
                  <div style={{ fontSize:10, letterSpacing:"1px", color:P.gold, whiteSpace:"nowrap" }}>
                    ALTIORA BENCHMARK {selYear}
                  </div>
                  {[["ADR",`€${curM.adr}`],["RevPAR",`€${curM.revpar}`],
                    ["Occ",`${curM.occ}%`],["Ricavi annui",`€${curM.totalRev.toLocaleString("it-IT")}`]].map(([l,v])=>(
                    <div key={l} style={{ fontSize:12 }}>
                      <span style={{ color:P.creamDim }}>{l} </span>
                      <span style={{ color:P.cream, fontWeight:500 }}>{v}</span>
                    </div>
                  ))}
                </div>

                <button onClick={()=>generate("prop", propPrompt)}
                  disabled={loading.prop || (!propInput.address && !propInput.price)}
                  style={{ ...S.btn(false), opacity: (loading.prop||(!propInput.address&&!propInput.price)) ? 0.4 : 1 }}>
                  {loading.prop ? "Analisi in corso…" : "Analizza Investimento"}
                </button>
              </div>

              {reports.prop && (
                <div style={{ borderTop:`1px solid ${P.border}`, padding:"24px" }}>
                  <div style={{ fontSize:10, letterSpacing:"2px", color:P.creamDim, marginBottom:14 }}>
                    VALUTAZIONE
                  </div>
                  <div style={{ fontSize:14, lineHeight:"1.9", whiteSpace:"pre-line" }}>
                    {reports.prop}
                  </div>
                </div>
              )}
            </div>
          </div>
        )}

        <div style={{ marginTop:28, paddingTop:16, borderTop:`1px solid ${P.border}`,
          fontSize:11, color:P.creamFaint, letterSpacing:"0.5px", lineHeight:"1.7" }}>
          Dati reali Altiora aggiornati al 15 maggio 2026. 2025: da tab Stats (ufficiale).
          2026: calcolati da tab Altiora (raw). Mesi giugno–ottobre 2026 = prenotazioni già confermate.
          Lo script Google Apps Script aggiornerà automaticamente questi dati ogni 1° del mese.
        </div>
      </div>
    </div>
  );
}


try {
  document.getElementById('loading').style.display='none';
  const root=ReactDOM.createRoot(document.getElementById("root"));
  root.render(<AltioraAnalytics/>);
} catch(e) {
  document.getElementById('loading').style.display='none';
  var ed=document.getElementById('error');
  ed.style.display='block';
  ed.textContent='Render error: '+e.message+'\n'+e.stack;
}
</script>
</body>
</html>
